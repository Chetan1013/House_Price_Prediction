<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Price Predictor</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body{
            background-color: #f5f5f5;
        }

        .main-card{
            margin-top: 30px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        .card-header-custom{
            background-color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .card-header-custom h1{
            font-size: 50px;
            font-weight: bold;
        }

        label{
            font-weight: bold;
            margin-bottom: 10px;
        }

        .form-section{
            padding: 20px;
        }

        .predict-btn{
            width: 100%;
            margin-top: 20px;
        }

        #prediction-result{
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card main-card">

        <!-- Header -->
        <div class="card-header-custom">
            <h1>Welcome to House Price Predictor</h1>
        </div>

        <!-- Form -->
        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <!-- Location -->
                    <div class="col-md-6 form-group form-section">
                        <label>Select the Location:</label>

                        <select name="location" id="location" class="form-control">

                            {% for location in locations %}

                            <option value="{{ location }}">
                                {{ location }}
                            </option>

                            {% endfor %}

                        </select>
                    </div>

                    <!-- BHK -->
                    <div class="col-md-6 form-group form-section">
                        <label>Enter BHK:</label>

                        <input
                            type="text"
                            name="bhk"
                            id="bhk"
                            class="form-control"
                            placeholder="Enter BHK"
                        >
                    </div>

                    <!-- Bathrooms -->
                    <div class="col-md-6 form-group form-section">
                        <label>Enter Number of Bathrooms:</label>

                        <input
                            type="text"
                            name="bath"
                            id="bath"
                            class="form-control"
                            placeholder="Enter Number of Bathrooms"
                        >
                    </div>

                    <!-- Square Feet -->
                    <div class="col-md-6 form-group form-section">
                        <label>Enter Square Feet:</label>

                        <input
                            type="text"
                            name="sqft"
                            id="sqft"
                            class="form-control"
                            placeholder="Enter Square Feet"
                        >
                    </div>

                </div>

                <!-- Button -->
                <div class="row px-3">
                    <div class="col-md-12">
                        <button
                            type="button"
                            class="btn btn-primary predict-btn"
                            onclick="send_data()"
                        >
                            Predict Price
                        </button>
                    </div>
                </div>

            </form>

            <br>

            <!-- Result -->
            <div class="text-center">
                <h3>
                    <span id="prediction-result"></span>
                </h3>
            </div>

        </div>

    </div>

</div>
<script>

    function send_data() {

        var form = document.querySelector('form');

        var formData = new FormData(form);

        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/predict', true);

        document.getElementById('prediction-result').innerHTML = "Predicting...";

        xhr.onreadystatechange = function () {

            if (xhr.readyState == 4 && xhr.status == 200) {

                document.getElementById('prediction-result').innerHTML =
                    "Prediction: " + xhr.responseText;

            }

        };

        xhr.send(formData);

    }

</script>

<!-- Bootstrap JS -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
